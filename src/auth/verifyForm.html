<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <style>
        body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        padding: 20px;
      }
      .container {
        margin: 0 auto;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 10px;
      }
      a {
        margin-top: 20px;
        padding: 12px 24px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        margin-bottom: 30px;
      }
    </style>
</head>
<body>

    <div class="container">

        <h1>Hello {name}!</h1>    
        <h3>Click on the button to confirm your email <br>
            and after you will have an opportunity to sign in</h3>
            <a href="{verify}">Confirm Email</a>

    </div>
    
</body>
</html>
