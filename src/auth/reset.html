<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        padding: 20px;
      }
      .container {
        margin: 0 auto;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 10px;
      }
     
      a {
        margin-top: 20px;
        padding: 12px 24px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }
      
    </style>
  </head>
  <body>
    <div class="container">
      <p>Hello, {name}!</p>
      <p>Click on the button to confirm Reset Password:</p>
      <a href="{reset}">Confirm Reset Password</a>
    </div>
  </body>
</html>
